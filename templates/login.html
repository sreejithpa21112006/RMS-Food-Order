{% extends "base.html" %}
{% block content %}
<style>
    .container {
        max-width: 450px !important;
        margin: 80px auto !important;
        box-shadow: 0 4px 20px rgba(117, 190, 239, 0.25) !important;
        border-radius: 8px !important;
    }

    #login-container {
        margin-top: 20px;
    }

    #login-form button {
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        font-size: 16px;
    }

    h2 {
        text-align: center;
        border-bottom: none;
        margin-bottom: 0;
        color: #2c3e50;
    }
</style>

<h2>Login to RMS</h2>

<div id="login-container">
    <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" required>

        <button type="submit">Login</button>
        <div style="text-align: center; margin: 15px 0;"><b>OR</b></div>
        <button type="button" id="google-login-btn"
            style="background-color: rgb(41, 128, 185); margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            </svg>
            Sign in with Google
        </button>
        <p id="error-message" style="color: red; display: none; text-align: center; margin-top: 15px;"></p>
    </form>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdHSzE4irgpeCJc2uFCj1Pf7UHR3WXDsE",
        authDomain: "rms-food-order.firebaseapp.com",
        projectId: "rms-food-order",
        storageBucket: "rms-food-order.firebasestorage.app",
        messagingSenderId: "985688419788",
        appId: "1:985688419788:web:cb529c20b464a57e3ec169"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // Email/Password Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-message');

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const idToken = await userCredential.user.getIdToken();

            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: idToken })
            });

            if (response.ok) {
                window.location.href = '/';
            } else {
                const data = await response.json();
                errorMsg.innerText = data.error || 'Failed to login.';
                errorMsg.style.display = 'block';
                await signOut(auth);
            }
        } catch (error) {
            console.error("Authentication error", error);
            errorMsg.innerText = error.message;
            errorMsg.style.display = 'block';
        }
    });

    // Google Sign In
    document.getElementById('google-login-btn').addEventListener('click', async () => {
        const errorMsg = document.getElementById('error-message');
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const idToken = await result.user.getIdToken();

            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: idToken })
            });

            if (response.ok) {
                window.location.href = '/';
            } else {
                const data = await response.json();
                errorMsg.innerText = data.error || 'Failed to login.';
                errorMsg.style.display = 'block';
                await signOut(auth); // Sign them out of Firebase if backend rejects them
            }
        } catch (error) {
            console.error("Google Auth error", error);
            errorMsg.innerText = error.message;
            errorMsg.style.display = 'block';
        }
    });
</script>
{% endblock %}
